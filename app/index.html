<style>
/* M3 Design Tokens */
:root{
  --bg:#0f131d;--surf-lowest:#0a0e18;--surf-low:#171b26;--surf:#1c1f2a;
  --surf2:#262a35;--surf3:#353944;--surf-highest:#313540;
  --indigo:#6366F1;--primary:#c0c1ff;--primary-container:#8083ff;
  --tertiary:#ffb783;--tertiary-container:rgba(255,183,131,.12);
  --green:#10B981;--green-container:rgba(16,185,129,.12);
  --yellow:#F59E0B;--red:#ff6b6b;--red-container:rgba(255,107,107,.12);
  --text:#dfe2f1;--dim:#c7c4d7;--muted:#908fa0;--dark-muted:#464554;
  --border:rgba(70,69,84,.45);--border-strong:rgba(70,69,84,.7);--ghost:rgba(70,69,84,.15);
  --headline:'Plus Jakarta Sans',system-ui,sans-serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono','Courier New',monospace;
  --r:10px;--r-lg:16px;--r-xl:24px;--r-2xl:32px;
  --cyan:var(--primary);--purple:var(--indigo);--accent:var(--primary);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden;padding-bottom:72px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(99,102,241,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.03) 1px,transparent 1px);
  background-size:44px 44px;}
@media(min-width:768px){body{padding-bottom:0;}}
h1,h2,h3,h4{font-family:var(--headline);}
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-feature-settings:'liga';font-feature-settings:'liga';-webkit-font-smoothing:antialiased;}

/* Loading screen */
#app-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;text-align:center;padding:24px;}
.app-loading-logo{font-family:var(--headline);font-size:28px;font-weight:800;color:var(--primary);letter-spacing:-.03em;}
.app-loading-logo em{font-style:normal;color:white;}
.app-loading-sub{font-size:13px;color:var(--muted);}
.app-loading-spinner{width:32px;height:32px;border:2px solid rgba(99,102,241,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- App shell — all UI injected by core.js initApp() -->
<div id="app-root">
  <div id="app-loading">
    <div class="app-loading-logo">⚡ Crawl<em>IQ</em></div>
    <div class="app-loading-spinner"></div>
    <div class="app-loading-sub">Initialising SEO analysis environment…</div>
    <noscript><p style="color:var(--red);margin-top:16px">JavaScript is required to use the CrawlIQ app. <a href="../" style="color:var(--primary)">Return to documentation →</a></p></noscript>
  </div>
</div>

<!-- core.js bootstraps everything: renders HTML, lazy-loads modules, handles URL params -->
<script src="../static/js/core.js?v=2.0.0"></script>

</body>
</html>
